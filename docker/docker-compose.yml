services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      MONGODB_URI: mongodb://mongo:27017/flowpay
    depends_on:
      - mongo

  front:
    build:
      context: ..
      dockerfile: docker/Dockerfile.front
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  mongo_data:
